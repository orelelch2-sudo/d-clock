<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Global Voice Retro World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #0f0; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; cursor: pointer; font-size: 18px; }
        button:hover { background: #0f0; color: #000; }
        #status { margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="recordBtn">הקלט פוסט קולי עולמי 🎙️</button>
        <div id="status">מערכת מוכנה... 📡</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. הגדרת עולם ה-3D רטרו ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // כיבוי החלקה למראה רטרו
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // יצירת רצפת רשת (Grid) כמו ב-Tron
        const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x004400);
        scene.add(grid);

        // דמות רטרו ראשונית (קובייה מפוקסלת)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const player = new THREE.Mesh(geometry, material);
        player.position.y = 0.5;
        scene.add(player);

        camera.position.z = 5;
        camera.position.y = 2;
        camera.lookAt(player.position);

        function animate() {
            requestAnimationFrame(animate);
            player.rotation.y += 0.01; // סיבוב הדמות
            grid.position.z += 0.05; // תנועה של הרצפה ליצירת הרגשת התקדמות
            if (grid.position.z > 2) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. מנוע הקלטת קול (Audio Stream) ---
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');

        recordBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play(); // משמיע חזרה (במקום זה נשלח לשרת בעתיד)
                    status.innerText = "פוסט קולי נשלח לעולם! 🌍✨";
                    audioChunks = [];
                };

                mediaRecorder.start();
                status.innerText = "מקליט... כולם שומעים אותך! 🔴";
                recordBtn.innerText = "עצור ושדר 📡";
            } else {
                mediaRecorder.stop();
                recordBtn.innerText = "הקלט פוסט קולי עולמי 🎙️";
            }
        };

        // התאמה למסך
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
