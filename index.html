<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <title>Global Voice Retro World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #0f0; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 100; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 10px 20px; cursor: pointer; font-size: 18px; }
        button:hover { background: #0f0; color: #000; }
        #status { margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="recordBtn">הקלט פוסט קולי עולמי 🎙️</button>
        <div id="status">מערכת מוכנה... 📡</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. הגדרת עולם ה-3D רטרו ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // כיבוי החלקה למראה רטרו
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // יצירת רצפת רשת (Grid) כמו ב-Tron
        const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x004400);
        scene.add(grid);

        // דמות רטרו ראשונית (קובייה מפוקסלת)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const player = new THREE.Mesh(geometry, material);
        player.position.y = 0.5;
        scene.add(player);

        camera.position.z = 5;
        camera.position.y = 2;
        camera.lookAt(player.position);

        function animate() {
            requestAnimationFrame(animate);
            player.rotation.y += 0.01; // סיבוב הדמות
            grid.position.z += 0.05; // תנועה של הרצפה ליצירת הרגשת התקדמות
            if (grid.position.z > 2) grid.position.z = 0;
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. מנוע הקלטת קול (Audio Stream) ---
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');

        recordBtn.onclick = async () => {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play(); // משמיע חזרה (במקום זה נשלח לשרת בעתיד)
                    status.innerText = "פוסט קולי נשלח לעולם! 🌍✨";
                    audioChunks = [];
                };

                mediaRecorder.start();
                status.innerText = "מקליט... כולם שומעים אותך! 🔴";
                recordBtn.innerText = "עצור ושדר 📡";
            } else {
                mediaRecorder.stop();
                recordBtn.innerText = "הקלט פוסט קולי עולמי 🎙️";
            }
        };

        // התאמה למסך
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>


    <!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Post: Social Arena 🏰🛡️</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #0f0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* תפריט חברתי */
        #social-hub { position: absolute; top: 20px; right: 20px; width: 200px; background: rgba(0,20,0,0.8); border: 1px solid #0f0; padding: 10px; pointer-events: auto; }
        .user-tag { padding: 5px; border-bottom: 1px border #050; cursor: pointer; font-size: 14px; }
        .user-tag:hover { background: #0f0; color: #000; }
        
        /* כפתורי שליטה */
        #controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; pointer-events: auto; }
        .btn { background: #000; border: 2px solid #0f0; color: #0f0; padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        #admin-btn { border-color: #ff00ff; color: #ff00ff; }

        /* כוונת (מוסתרת בלובי) */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 15px; height: 15px; border: 2px solid #f00; border-radius: 50%; display: none; transform: translate(-50%, -50%); }
        
        /* הודעות מערכת */
        #notif { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 20px; border: 1px solid #fff; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="crosshair"></div>
    <div id="notif">WAINTING FOR TEAM APPROVAL... (1/3) ⏳</div>

    <div id="social-hub">
        <strong>ONLINE USERS</strong>
        <div id="user-list">
            <div class="user-tag" onclick="inviteUser('Stickman_42')">👤 Stickman_42 (Add to Post)</div>
            <div class="user-tag" onclick="inviteUser('Guest_09')">👤 Guest_09 (Add to Post)</div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startVote()">🔥 START COMBAT MODE</button>
        <button id="admin-btn" class="btn" onclick="adminForceStart()" style="display:none;">👑 FORCE START (ADMIN)</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, isCombatMode = false;
let myGroup = [];
const isAdmin = true; // הכוח שלך 👑

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // תאורה
    scene.add(new THREE.AmbientLight(0x404040));
    const pointLight = new THREE.PointLight(0x0f0, 1, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    // רצפה
    const grid = new THREE.GridHelper(100, 100, 0x0f0, 0x222222);
    scene.add(grid);

    if(isAdmin) document.getElementById('admin-btn').style.display = 'block';

    window.addEventListener('resize', onWindowResize);
    animate();
}

function inviteUser(name) {
    if(!myGroup.includes(name)) {
        myGroup.push(name);
        alert(name + " נוסף לקבוצת הפוסט שלך! 🏰");
        createGroupMember(name);
    }
}

function createGroupMember(name) {
    // יצירת דמות תלת-ממדית (במקום סטיקמן) עבור חברי קבוצה
    const geometry = new THREE.BoxGeometry(0.8, 1.8, 0.5);
    const material = new THREE.MeshPhongMaterial({ color: 0x00ff00, wireframe: true });
    const member = new THREE.Mesh(geometry, material);
    member.position.set(Math.random() * 4 - 2, 0.9, Math.random() * -5);
    scene.add(member);
}

function startVote() {
    const notif = document.getElementById('notif');
    notif.style.display = 'block';
    // סימולציה של אישור קבוצה
    setTimeout(() => {
        enterCombatMode();
    }, 2000);
}

function adminForceStart() {
    enterCombatMode();
    alert("👑 ADMIN OVERRIDE: GAME STARTING NOW!");
}

function enterCombatMode() {
    isCombatMode = true;
    document.getElementById('notif').innerHTML = "⚔️ COMBAT MODE ACTIVE! ⚔️";
    document.getElementById('crosshair').style.display = 'block';
    document.getElementById('social-hub').style.display = 'none';
    
    // שינוי תאורה לזירה
    scene.background = new THREE.Color(0x200000); 
    
    setTimeout(() => {
        document.getElementById('notif').style.display = 'none';
    }, 1500);
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
</body>
</html>
