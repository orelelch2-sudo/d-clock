<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiverse D-Tube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --d-glow: #00ffcc; --bg-dark: #050505; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #header { height: 60px; background: #0f0f0f; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; box-shadow: 0 0 15px var(--d-glow); }
        #logo { color: var(--d-glow); font-weight: bold; font-size: 24px; letter-spacing: 2px; }
        
        #main-container { display: flex; height: calc(100vh - 60px); }
        #video-section { flex: 3; padding: 20px; position: relative; }
        #video-placeholder { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        #convert-btn { position: absolute; bottom: 20px; right: 40px; padding: 15px 25px; background: transparent; border: 2px solid var(--d-glow); color: var(--d-glow); border-radius: 30px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; box-shadow: 0 0 10px var(--d-glow); z-index: 10; }
        #convert-btn:hover { background: var(--d-glow); color: black; box-shadow: 0 0 30px var(--d-glow); }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: 1s; }
        #canvas-container.active { pointer-events: all; opacity: 1; }

        #sidebar { flex: 1; background: #0f0f0f; border-left: 1px solid #333; padding: 20px; }
        .recommendation { width: 100%; height: 80px; background: #1a1a1a; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="header">
    <div id="logo">D-TUBE 🌌</div>
</div>

<div id="main-container">
    <div id="video-section">
        <div id="video-placeholder">
            <h2 id="status-text">המתין לסרטון... 🎥</h2>
            <div id="canvas-container"></div>
        </div>
        <button id="convert-btn" onclick="convertTo3D()">הפוך ל-3D בלחיצה ✨</button>
        <h3 style="color: var(--d-glow);">דמות מהסרטון: זיהוי אוטומטי... 👤</h3>
    </div>

    <div id="sidebar">
        <h4 style="color: #888;">סרטוני Multiverse נוספים</h4>
        <div class="recommendation"></div>
        <div class="recommendation"></div>
    </div>
</div>

<script>
    let scene, camera, renderer, cube;
    const container = document.getElementById('canvas-container');

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, (window.innerWidth * 0.7) / (window.innerHeight * 0.5), 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth * 0.7, window.innerHeight * 0.5);
        container.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry(1, 2, 0.5);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, wireframe: true });
        cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(cube) cube.rotation.y += 0.02;
        renderer.render(scene, camera);
    }

    function convertTo3D() {
        document.getElementById('status-text').style.display = 'none';
        container.classList.add('active');
        document.getElementById('convert-btn').innerText = "ההמרה הצליחה! ✅";
        if(!scene) {
            init3D();
            animate();
        }
    }
</script>

</body>
</html>
